events {
    worker_connections 1024;
}

http {
    log_format trace '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for" '
                     'trace_id=$trace_id';

    map $http_traceparent $trace_id {
        default $request_id;
        "~^00-(.*)-.*-.*$" $1;
    }

    server {
        listen 80;
        # In the future, SSL configurations can be added here using the ssl/ directory
        # listen 443 ssl;
        # ssl_certificate /etc/nginx/ssl/jumpa.crt;
        # ssl_certificate_key /etc/nginx/ssl/jumpa.key;

        server_name localhost;

        proxy_set_header traceparent "00-${trace_id}-0000000000000000-01";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        location /api/ {
            proxy_pass http://gateway-api:8000/;
        }

        location /tiles/ {
            proxy_pass http://martin:3000/;
        }

        location / {
            proxy_pass http://web-app:4321/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
